# App Service: Flask uygulamasini disariya acar
# NodePort = Minikube'da disaridan erisim icin (production'da LoadBalancer/Ingress kullanilir)
apiVersion: v1
kind: Service
metadata:
  name: task-manager-service #Cluster içindeki diğer uygulamalar bu servise doğrudan http://task-manager-service DNS adıyla erişebilirler.
  namespace: task-manager
  labels:
    app: task-manager
spec:
  type: NodePort
  selector:
    app: task-manager #Bu servis, cluster içinde gidip app: task-manager etiketine sahip olan bütün aktif Pod'ları bulur ve gelen trafiği o Pod'lara otomatik olarak (Load Balancer gibi) dağıtır.
  ports:
    - port: 5000                  # Cluster icinden erisim portu
      targetPort: 5000            # Container portu
      nodePort: 30080             # Disaridan erisim portu (minikube ip:30080)
      protocol: TCP
