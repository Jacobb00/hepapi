# Secret: MongoDB root sifresi gibi hassas bilgileri guvende tutar
# NOT: Gercek production'da "sealed-secrets" veya "external-secrets" kullanilir
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: task-manager
  labels:
    app: mongodb
type: Opaque
data:
  # base64 encoded degerler (echo -n "rootpassword" | base64)
  mongo-root-username: cm9vdA==               # "root"
  mongo-root-password: dGFza21hbmFnZXIxMjM=   # "taskmanager123"
